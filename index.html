<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUA Learning Portal - Full System</title>
    <style>
        :root { --sua-green: #2e7d32; --sua-yellow: #fbc02d; --bg: #eef2f3; --blue: #1565c0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        header { 
            background: var(--sua-green); color: white; padding: 15px; text-align: center; 
            border-bottom: 4px solid var(--sua-yellow); position: relative;
        }

        .notification-icon {
            position: absolute; right: 20px; top: 25px; cursor: pointer; font-size: 20px;
        }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Layouts */
        .card { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; 
            text-align: center; margin-bottom: 20px; border-top: 5px solid var(--sua-green);
        }
        
        .lecturer-card { border-top: 5px solid var(--blue); text-align: left; }
        .student-card { border-top: 5px solid var(--sua-green); text-align: left; }

        input, select, textarea { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        button { 
            width: 100%; padding: 12px; background: var(--sua-green); color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        
        .btn-blue { background: var(--blue); }
        .btn-outline { background: none; color: #555; text-decoration: underline; font-size: 13px; width: auto; }
        .btn-red { background: #d32f2f; margin-top: 15px; }

        .hidden { display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .badge { background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="notification-icon" onclick="alert('Una notification 2 mpya!')">🔔<span id="notifCount" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px;">2</span></div>
    <h1>SUA Learning Portal</h1>
    <p id="topStatus">Karibu Chuo Kikuu cha Sokoine</p>
</header>

<div class="container">

    <!-- 1. LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h2>Ingia (Login)</h2>
        <select id="loginRole">
            <option value="student">Mwanafunzi (Student)</option>
            <option value="lecturer">Mhadhiri (Lecturer)</option>
        </select>
        <input id="loginEmail" placeholder="Email / Registration No">
        <input id="loginPass" type="password" placeholder="Nenosiri">
        <button onclick="handleLogin()">Login</button>
        <div style="margin-top:15px;">
            <button class="btn-outline" onclick="showPage('forgotPage')">Umesahau Nenosiri?</button> | 
            <button class="btn-outline" onclick="showPage('registerPage')">Jisajili Hapa</button>
        </div>
    </div>

    <!-- 2. REGISTER PAGE -->
    <div id="registerPage" class="card hidden">
        <h2>Tengeneza Akaunti</h2>
        <select id="regRole">
            <option value="student">Jisajili kama Mwanafunzi</option>
            <option value="lecturer">Jisajili kama Mhadhiri</option>
        </select>
        <input id="regName" placeholder="Jina Kamili">
        <input id="regEmail" placeholder="Barua Pepe (Email)">
        <input id="regPass" type="password" placeholder="Nenosiri Jipya">
        <button onclick="alert('Usajili umekamilika! Karibu SUA.'); showPage('loginPage')">Jisajili</button>
        <button class="btn-outline" onclick="showPage('loginPage')">Rudi Kwenye Login</button>
    </div>

    <!-- 3. FORGOT PASSWORD -->
    <div id="forgotPage" class="card hidden">
        <h2>Rejesha Nenosiri</h2>
        <p style="font-size:13px; color:#666;">Weka email yako ili upate maelekezo.</p>
        <input id="forgEmail" placeholder="Weka Email Yako">
        <button onclick="alert('Tumetuma maelekezo kwenye email yako.'); showPage('loginPage')">Tuma Link</button>
        <button class="btn-outline" onclick="showPage('loginPage')">Rudi Kwenye Login</button>
    </div>

    <!-- 4. LECTURER DASHBOARD -->
    <div id="lecturerDashboard" class="card lecturer-card hidden">
        <span class="badge" style="color:var(--blue)">LECTURER DASHBOARD</span>
        <h2 id="lecWelcome">Habari, Mhadhiri</h2>
        <hr>
        <h4>Upload Material</h4>
        <input type="text" id="docTitle" placeholder="Jina la File (e.g. Soil Biology)">
        <select id="docType">
            <option value="notes">Lecture Notes</option>
            <option value="assign">Assignment</option>
        </select>
        <input type="file">
        <button class="btn-blue" onclick="uploadData()">Pakia Kazi (Upload)</button>
        <button class="btn-red" onclick="location.reload()">Logout</button>
    </div>

    <!-- 5. STUDENT DASHBOARD -->
    <div id="studentDashboard" class="card student-card hidden">
        <span class="badge" style="color:var(--sua-green)">STUDENT DASHBOARD</span>
        <h2>Student Panel</h2>
        <hr>
        <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px;">
            <strong>Soil Science Notes</strong><br>
            <small>Uploaded by: Dr. Juma</small><br>
            <button style="width:auto; padding:5px 10px; margin-top:5px; font-size:12px;">Download PDF</button>
        </div>
        <button class="btn-red" onclick="location.reload()">Logout</button>
    </div>

</div>

<script>
    function showPage(pageId) {
        const pages = ['loginPage', 'registerPage', 'forgotPage', 'lecturerDashboard', 'studentDashboard'];
        pages.forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
    }

    function handleLogin() {
        let role = document.getElementById("loginRole").value;
        let email = document.getElementById("loginEmail").value;

        if(email === "") { alert("Tafadhali jaza taarifa zako!"); return; }

        if(role === "lecturer") {
            showPage('lecturerDashboard');
            document.getElementById("lecWelcome").innerText = "Habari, " + email;
            document.getElementById("topStatus").innerText = "Lecturer Portal Active";
        } else {
            showPage('studentDashboard');
            document.getElementById("topStatus").innerText = "Student Portal Active";
        }
    }

    function uploadData() {
        let title = document.getElementById("docTitle").value;
        if(title === "") { alert("Weka jina la file!"); return; }
        alert("Imefanikiwa! " + title + " sasa inaonekana kwa wanafunzi.");
    }
</script>

</body>
</html>
